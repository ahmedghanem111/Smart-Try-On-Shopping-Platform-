<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <style>
      .bg { 
        fill: #0d1b2a; 
      }
      .logo-text { 
        font-family: 'Times New Roman', Times, serif; 
        font-size: 220px; 
        font-weight: bold; 
        letter-spacing: -5px; 
        text-anchor: middle; 
        dominant-baseline: central; 
      }
      /* تأثير الجليتش السماوي (متزحزح لليسار) */
      .glitch-cyan { 
        fill: #3498db; 
      }
      /* تأثير الجليتش الأحمر (متزحزح لليمين) */
      .glitch-red { 
        fill: #e74c3c; 
      }
      /* النص الأساسي باللون الأبيض ليبرز على الخلفية الداكنة */
      .main-text { 
        fill: #ffffff; 
      }
    </style>
  </defs>

  <!-- الخلفية المربعة بحواف دائرية عصرية -->
  <rect width="512" height="512" rx="112" class="bg" />

  <!-- طبقات النص لعمل تأثير الـ Glitch -->
  <text x="246" y="260" class="logo-text glitch-cyan">FM</text>
  <text x="266" y="260" class="logo-text glitch-red">FM</text>
  <text x="256" y="260" class="logo-text main-text">FM</text>
</svg>
